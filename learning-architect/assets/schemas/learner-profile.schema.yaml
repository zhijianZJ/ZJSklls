$schema: https://json-schema.org/draft/2020-12/schema
title: Learner Profile
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, personal, experience, learning_preferences, motivation, constraints, swot, unknowns]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/schema_version}
  content_version: {$ref: common.schema.yaml#/$defs/content_version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  personal: {$ref: '#/$defs/material_section'}
  experience: {$ref: '#/$defs/material_section'}
  learning_preferences: {$ref: '#/$defs/material_section'}
  motivation: {$ref: '#/$defs/material_section'}
  constraints: {$ref: '#/$defs/material_section'}
  swot:
    type: object
    additionalProperties: false
    required: [Strength, Weakness, Opportunity, Risk]
    properties:
      Strength: {$ref: '#/$defs/material_list'}
      Weakness: {$ref: '#/$defs/material_list'}
      Opportunity: {$ref: '#/$defs/material_list'}
      Risk: {$ref: '#/$defs/material_list'}
  unknowns: {$ref: '#/$defs/material_list'}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
$defs:
  material_item:
    type: object
    additionalProperties: false
    required: [value, epistemic_class, source, confidence, evidence_ids, decision_impact]
    properties:
      value: {}
      epistemic_class:
        type: string
        enum: [fact, self-report, inference, assumption, evidence]
      source: {$ref: common.schema.yaml#/$defs/operational_source}
      confidence: {$ref: common.schema.yaml#/$defs/confidence}
      evidence_ids:
        type: array
        uniqueItems: true
        items: {type: string, minLength: 1}
      decision_impact: {type: string, minLength: 1}
  material_section:
    type: object
    minProperties: 1
    additionalProperties: {$ref: '#/$defs/material_item'}
  material_list:
    type: array
    items: {$ref: '#/$defs/material_item'}
