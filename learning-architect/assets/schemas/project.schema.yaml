$schema: https://json-schema.org/draft/2020-12/schema
title: Learning Project
type: object
additionalProperties: false
$defs:
  rubric_dimension:
    type: object
    additionalProperties: false
    required: [weight, performance_bands]
    properties:
      weight: {type: number, exclusiveMinimum: 0, maximum: 100}
      performance_bands:
        type: object
        additionalProperties: false
        required: [insufficient, developing, proficient, strong]
        properties:
          insufficient: {type: string, minLength: 1}
          developing: {type: string, minLength: 1}
          proficient: {type: string, minLength: 1}
          strong: {type: string, minLength: 1}
  analytic_rubric:
    type: object
    additionalProperties: false
    required: [correctness, capability_behavior, reliability, responsible_practice, business_value, technical_communication]
    properties:
      correctness: {$ref: "#/$defs/rubric_dimension"}
      capability_behavior: {$ref: "#/$defs/rubric_dimension"}
      reliability: {$ref: "#/$defs/rubric_dimension"}
      responsible_practice: {$ref: "#/$defs/rubric_dimension"}
      business_value: {$ref: "#/$defs/rubric_dimension"}
      technical_communication: {$ref: "#/$defs/rubric_dimension"}
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, problem, inputs, constraints, deliverables, competency_ids, business_value, common_failure_modes, demonstration_requirements, documentation_requirements, retrospective_requirements, rubric]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/version}
  content_version: {$ref: common.schema.yaml#/$defs/version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  problem: {type: string}
  inputs: {type: array}
  constraints: {type: array, minItems: 1, items: {type: string}}
  deliverables: {type: array}
  competency_ids: {type: array, items: {type: string}}
  business_value: {type: string}
  common_failure_modes: {type: array, minItems: 1, items: {type: string}}
  demonstration_requirements: {type: array, minItems: 1, items: {type: string}}
  documentation_requirements: {type: array, minItems: 1, items: {type: string}}
  retrospective_requirements: {type: array, minItems: 1, items: {type: string}}
  rubric: {$ref: "#/$defs/analytic_rubric"}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
