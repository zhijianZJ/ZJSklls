$schema: https://json-schema.org/draft/2020-12/schema
title: Learning Issue
type: object
additionalProperties: false
required:
  - id
  - schema_version
  - content_version
  - status
  - source
  - confidence
  - created_at
  - updated_at
  - user_words
  - context
  - issue_type
  - observed_symptom
  - suspected_causes
  - earliest_blocker
  - routing_mode
  - next_action
  - success_signal
  - fallback_action
  - resolution_status
  - result_observation
  - evidence_ids
  - plan_impact
  - next_check
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/schema_version}
  content_version: {$ref: common.schema.yaml#/$defs/content_version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  user_words: {type: string, minLength: 1}
  context:
    type: object
    additionalProperties: false
    required: [current_goal, current_task]
    properties:
      current_goal: {type: string, minLength: 1}
      current_task: {type: string, minLength: 1}
  issue_type:
    type: string
    enum:
      - knowledge_confusion
      - practice_transfer
      - starting_ambiguity
      - prerequisite_gap
      - tool_environment
      - task_overreach
      - resource_mismatch
      - capacity_change
      - goal_change
  observed_symptom: {type: string, minLength: 1}
  suspected_causes:
    type: array
    minItems: 1
    maxItems: 3
    items:
      type: object
      additionalProperties: false
      required: [cause, source, confidence]
      properties:
        cause: {type: string, minLength: 1}
        source: {type: string, minLength: 1}
        confidence: {$ref: common.schema.yaml#/$defs/confidence}
  earliest_blocker: {type: string, minLength: 1}
  routing_mode:
    type: string
    enum: [direct_action, guided_diagnosis, safety_handoff]
  next_action: {type: string, minLength: 1}
  success_signal: {type: string, minLength: 1}
  fallback_action: {type: string, minLength: 1}
  resolution_status:
    type: string
    enum: [open, testing, resolved, escalated]
  result_observation: {type: string}
  evidence_ids:
    type: array
    uniqueItems: true
    items: {$ref: common.schema.yaml#/$defs/id}
  plan_impact:
    type: object
    additionalProperties: false
    required: [level, reason, affected_artifacts, rollback_target]
    properties:
      level:
        type: string
        enum: [none, task, week, roadmap, goal_system]
      reason: {type: string, minLength: 1}
      affected_artifacts:
        type: array
        uniqueItems: true
        items: {type: string, minLength: 1}
      rollback_target:
        type: string
        enum: [none, weekly-planner, roadmap, goal-analysis]
  next_check: {type: string, minLength: 1}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
