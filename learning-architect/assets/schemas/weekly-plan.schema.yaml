$schema: https://json-schema.org/draft/2020-12/schema
title: Weekly Plan
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, week_id, weekly_outcome, capacity_hours, tasks, retrieval_practice, project_work, minimum_delivery, risk, review]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/schema_version}
  content_version: {$ref: common.schema.yaml#/$defs/content_version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  week_id: {type: string, minLength: 1}
  weekly_outcome: {type: string, minLength: 1}
  capacity_hours: {type: number, exclusiveMinimum: 0}
  tasks:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/task'}
  retrieval_practice:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/retrieval'}
  project_work:
    type: object
    additionalProperties: false
    required: [project_id, milestone, estimated_hours, scheduled]
    properties:
      project_id: {type: string, minLength: 1}
      milestone: {type: string, minLength: 1}
      estimated_hours: {type: number, minimum: 0}
      scheduled: {type: string, minLength: 1}
  minimum_delivery: {type: string}
  risk:
    type: object
    additionalProperties: false
    required: [condition, early_warning, mitigation]
    properties:
      condition: {type: string, minLength: 1}
      early_warning: {type: string, minLength: 1}
      mitigation: {type: string, minLength: 1}
  review:
    type: object
    additionalProperties: false
    required: [scheduled, estimated_hours, questions]
    properties:
      scheduled: {$ref: common.schema.yaml#/$defs/timestamp}
      estimated_hours: {type: number, minimum: 0}
      questions: {type: array, minItems: 1, items: {type: string, minLength: 1}}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
$defs:
  task:
    type: object
    additionalProperties: false
    required: [id, outcome, competency_ids, estimated_hours, scheduled, dependency, evidence_output, completion_criterion]
    properties:
      id: {$ref: common.schema.yaml#/$defs/id}
      outcome: {type: string, minLength: 1}
      competency_ids: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
      estimated_hours: {type: number, exclusiveMinimum: 0}
      scheduled: {type: string, minLength: 1}
      dependency: {type: string, minLength: 1}
      evidence_output: {type: string, minLength: 1}
      completion_criterion: {type: string, minLength: 1}
  retrieval:
    type: object
    additionalProperties: false
    required: [competency_id, activity, estimated_hours, scheduled]
    properties:
      competency_id: {type: string, minLength: 1}
      activity: {type: string, minLength: 1}
      estimated_hours: {type: number, exclusiveMinimum: 0}
      scheduled: {type: string, minLength: 1}
