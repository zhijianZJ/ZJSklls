$schema: https://json-schema.org/draft/2020-12/schema
title: Target Outcome
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, outcome_type, primary_goal, deadline, success_evidence, key_results]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/schema_version}
  content_version: {$ref: common.schema.yaml#/$defs/content_version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  outcome_type: {type: string, minLength: 1}
  primary_goal: {type: string, minLength: 1}
  deadline: {type: string, format: date}
  success_evidence: {type: array, minItems: 1, items: {type: string, minLength: 1}}
  key_results: {type: array, minItems: 1, items: {type: string, minLength: 1}}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
