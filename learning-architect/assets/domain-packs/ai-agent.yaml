target_outcomes:
  - id: production-ai-agent-delivery
    name: Production AI agent delivery
    description: Design, evaluate, deploy, and explain an AI agent that solves a bounded business problem under explicit reliability, security, and cost constraints.
    source: Learning Architect reference synthesis
    as_of: "2026-07-13"
    success_evidence:
      - A working external-facing delivery with acceptance evidence
      - Reproducible functional and quality evaluations
      - An architecture and operations handover suitable for another engineer
  - id: ai-agent-engineering-employment
    name: AI agent engineering employment readiness
    description: Present verified implementation evidence and make defensible technical and business trade-offs in a hiring process.
    source: Learning Architect reference synthesis
    as_of: "2026-07-13"
    success_evidence:
      - A portfolio case with traceable competency coverage
      - A live architecture and failure-analysis walkthrough
      - Role-specific interview and work-sample evidence

competencies:
  - id: python-foundation
    name: Python foundation
    category: software-engineering
    levels:
      L0: "No exposure: has not encountered Python concepts or practice."
      L1: "Recognize and explain basics: describes Python syntax, modules, tests, and errors."
      L2: "Complete with example/template/guidance: implements a demonstrated Python module using scaffolding."
      L3: "Independently complete a bounded real task: implements and tests a maintainable Python component."
      L4: "Debug, optimize, migrate, and handle exceptions: improves Python reliability, performance, dependencies, and error paths."
      L5: "Architect, review, and teach: defines Python engineering standards and guides cross-service decisions."
    evidence_requirements: [Runnable repository, automated tests, dependency and error-handling rationale]
  - id: api-integration
    name: API integration
    category: software-engineering
    levels:
      L0: "No exposure: has not encountered API request-response concepts or practice."
      L1: "Recognize and explain basics: describes endpoints, authentication, payloads, and status codes."
      L2: "Complete with example/template/guidance: calls a documented API using a provided client pattern."
      L3: "Independently complete a bounded real task: integrates an API with validation, timeouts, and errors."
      L4: "Debug, optimize, migrate, and handle exceptions: improves retries, idempotency, rate limits, latency, and degradation."
      L5: "Architect, review, and teach: defines interface standards and guides multi-system integration decisions."
    evidence_requirements: [Contract tests, failure simulation, integration decision record]
  - id: prompt-engineering
    name: Prompt engineering
    category: model-interaction
    levels:
      L0: "No exposure: has not encountered prompt design concepts or practice."
      L1: "Recognize and explain basics: describes instructions, context, examples, outputs, and limitations."
      L2: "Complete with example/template/guidance: adapts a demonstrated structured prompt using guidance."
      L3: "Independently complete a bounded real task: designs and evaluates prompts for a real workflow."
      L4: "Debug, optimize, migrate, and handle exceptions: improves prompt robustness, schemas, latency, cost, and edge cases."
      L5: "Architect, review, and teach: defines prompting standards and guides interaction-pattern decisions."
    evidence_requirements: [Versioned prompts, evaluation set, comparison report]
  - id: llm-fundamentals
    name: LLM fundamentals
    category: model-understanding
    levels:
      L0: "No exposure: has not encountered LLM concepts or practice."
      L1: "Recognize and explain basics: describes tokens, context, sampling, hallucination, and constraints."
      L2: "Complete with example/template/guidance: selects settings for a demonstrated task using a comparison guide."
      L3: "Independently complete a bounded real task: selects a model and justifies settings with controlled evidence."
      L4: "Debug, optimize, migrate, and handle exceptions: diagnoses behavior and improves quality, safety, latency, privacy, and cost."
      L5: "Architect, review, and teach: defines model-selection principles and guides high-impact decisions."
    evidence_requirements: [Model comparison, controlled experiments, limitations briefing]
  - id: embedding-retrieval
    name: Embedding and retrieval
    category: knowledge-systems
    levels:
      L0: "No exposure: has not encountered embedding or retrieval concepts or practice."
      L1: "Recognize and explain basics: describes embeddings, chunking, indexing, similarity, and metrics."
      L2: "Complete with example/template/guidance: builds a demonstrated semantic index using a provided pattern."
      L3: "Independently complete a bounded real task: builds and evaluates retrieval for a real knowledge set."
      L4: "Debug, optimize, migrate, and handle exceptions: improves chunking, reranking, freshness, scale, access, and cost."
      L5: "Architect, review, and teach: defines retrieval standards and guides knowledge-system decisions."
    evidence_requirements: [Indexed corpus, retrieval evaluation, design rationale]
  - id: rag-engineering
    name: RAG engineering
    category: knowledge-systems
    levels:
      L0: "No exposure: has not encountered RAG concepts or practice."
      L1: "Recognize and explain basics: describes ingestion, retrieval, grounding, citation, and common failures."
      L2: "Complete with example/template/guidance: assembles a demonstrated cited RAG flow using scaffolding."
      L3: "Independently complete a bounded real task: delivers and evaluates RAG for a real knowledge need."
      L4: "Debug, optimize, migrate, and handle exceptions: improves grounding, security, latency, freshness, and fallbacks."
      L5: "Architect, review, and teach: defines RAG governance and guides enterprise knowledge decisions."
    evidence_requirements: [End-to-end RAG system, groundedness tests, failure analysis]
  - id: tool-calling
    name: Tool calling
    category: agent-engineering
    levels:
      L0: "No exposure: has not encountered tool-calling concepts or practice."
      L1: "Recognize and explain basics: describes schemas, selection, arguments, results, and failure risks."
      L2: "Complete with example/template/guidance: implements a demonstrated validated tool call using a template."
      L3: "Independently complete a bounded real task: delivers a permissioned tool flow with tests."
      L4: "Debug, optimize, migrate, and handle exceptions: improves tool choice, safety, observability, latency, and recovery."
      L5: "Architect, review, and teach: defines tool-platform standards and guides action-system decisions."
    evidence_requirements: [Tool schemas, integration tests, permission and failure controls]
  - id: agent-workflow
    name: Agent workflow
    category: agent-engineering
    levels:
      L0: "No exposure: has not encountered agent workflow concepts or practice."
      L1: "Recognize and explain basics: describes state, planning, action, observation, termination, and checkpoints."
      L2: "Complete with example/template/guidance: assembles a demonstrated stateful loop using a workflow template."
      L3: "Independently complete a bounded real task: delivers an agent workflow with explicit termination and recovery."
      L4: "Debug, optimize, migrate, and handle exceptions: improves branching, memory, reliability, traces, and human escalation."
      L5: "Architect, review, and teach: defines orchestration standards and guides high-autonomy workflow decisions."
    evidence_requirements: [State diagram, workflow traces, termination and recovery tests]
  - id: mcp-integration
    name: MCP integration
    category: interoperability
    levels:
      L0: "No exposure: has not encountered MCP concepts or practice."
      L1: "Recognize and explain basics: describes clients, servers, capabilities, negotiation, and trust boundaries."
      L2: "Complete with example/template/guidance: connects a demonstrated MCP client and server using guidance."
      L3: "Independently complete a bounded real task: delivers a tested least-privilege MCP integration."
      L4: "Debug, optimize, migrate, and handle exceptions: improves interoperability, security, observability, and compatibility."
      L5: "Architect, review, and teach: defines MCP platform conventions and guides ecosystem decisions."
    evidence_requirements: [Working MCP integration, protocol tests, trust-boundary review]
  - id: multi-agent-coordination
    name: Multi-agent coordination
    category: agent-engineering
    levels:
      L0: "No exposure: has not encountered multi-agent coordination concepts or practice."
      L1: "Recognize and explain basics: describes roles, handoffs, state, conflicts, and coordination overhead."
      L2: "Complete with example/template/guidance: assembles a demonstrated delegation flow using a handoff template."
      L3: "Independently complete a bounded real task: delivers evaluated coordination among specialized agents."
      L4: "Debug, optimize, migrate, and handle exceptions: improves conflicts, latency, cost, fault containment, and escalation."
      L5: "Architect, review, and teach: defines multi-agent governance and guides distributed-agent decisions."
    evidence_requirements: [Coordination design, trace set, comparative single-agent baseline]
  - id: evaluation-observability
    name: Evaluation and observability
    category: quality-engineering
    levels:
      L0: "No exposure: has not encountered evaluation or observability concepts or practice."
      L1: "Recognize and explain basics: describes test sets, metrics, traces, judges, feedback, and limits."
      L2: "Complete with example/template/guidance: runs a demonstrated evaluation using a provided test template."
      L3: "Independently complete a bounded real task: builds reproducible evaluations and traces for a real workflow."
      L4: "Debug, optimize, migrate, and handle exceptions: improves metrics, regression gates, monitoring, bias, cost, and incidents."
      L5: "Architect, review, and teach: defines evaluation governance and guides measurement under uncertainty."
    evidence_requirements: [Versioned evaluation set, dashboards or traces, regression report]
  - id: deployment-security
    name: Deployment and security
    category: operations
    levels:
      L0: "No exposure: has not encountered deployment or security concepts or practice."
      L1: "Recognize and explain basics: describes environments, secrets, access, injection, logging, and rollback."
      L2: "Complete with example/template/guidance: deploys a demonstrated service using a secure template and checklist."
      L3: "Independently complete a bounded real task: deploys a guarded service with monitoring and rollback evidence."
      L4: "Debug, optimize, migrate, and handle exceptions: improves reliability, privacy, security, cost, and incident response."
      L5: "Architect, review, and teach: defines production governance and guides high-risk deployment decisions."
    evidence_requirements: [Deployed service, threat model, operations and rollback evidence]
  - id: business-problem-framing
    name: Business problem framing
    category: product-business
    levels:
      L0: "No exposure: has not encountered business problem framing concepts or practice."
      L1: "Recognize and explain basics: describes users, jobs, constraints, value, risk, and success measures."
      L2: "Complete with example/template/guidance: frames a demonstrated problem using a stakeholder brief template."
      L3: "Independently complete a bounded real task: validates a real problem and measurable acceptance criteria."
      L4: "Debug, optimize, migrate, and handle exceptions: reframes weak assumptions and improves scope, adoption, risk, and economics."
      L5: "Architect, review, and teach: defines framing standards and guides cross-functional portfolio decisions."
    evidence_requirements: [Dated stakeholder brief, alternatives analysis, value measures]
  - id: technical-communication
    name: Technical communication
    category: professional
    levels:
      L0: "No exposure: has not encountered technical communication concepts or practice."
      L1: "Recognize and explain basics: describes purpose, audience, components, evidence, and limitations."
      L2: "Complete with example/template/guidance: produces a demonstrated technical note using a provided structure."
      L3: "Independently complete a bounded real task: delivers a clear architecture, demo, and handover for named audiences."
      L4: "Debug, optimize, migrate, and handle exceptions: repairs misunderstandings and improves trade-off, incident, and decision communication."
      L5: "Architect, review, and teach: defines communication standards and guides high-stakes technical narratives."
    evidence_requirements: [Architecture narrative, live walkthrough, audience feedback]

dependencies:
  - {from: python-foundation, to: api-integration}
  - {from: llm-fundamentals, to: prompt-engineering}
  - {from: llm-fundamentals, to: embedding-retrieval}
  - {from: python-foundation, to: tool-calling}
  - {from: api-integration, to: tool-calling}
  - {from: embedding-retrieval, to: rag-engineering}
  - {from: prompt-engineering, to: rag-engineering}
  - {from: prompt-engineering, to: agent-workflow}
  - {from: tool-calling, to: agent-workflow}
  - {from: api-integration, to: mcp-integration}
  - {from: tool-calling, to: mcp-integration}
  - {from: agent-workflow, to: multi-agent-coordination}
  - {from: evaluation-observability, to: deployment-security}
  - {from: agent-workflow, to: deployment-security}
  - {from: business-problem-framing, to: technical-communication}

project_archetypes:
  - id: focused-tool
    level: 1
    name: Focused tool
    example: A validated tool-calling utility for one bounded operational task
    inputs: [Bounded task brief, sample valid and invalid requests, tool contract]
    constraints: [One bounded tool, least-privilege access, deterministic validation, limited implementation time]
    deliverables: [Runnable utility, tests, usage note]
    competency_ids: [python-foundation, api-integration, tool-calling]
    business_value: Reduce repeat manual work while preserving a reviewable action trail.
    evidence: [Runnable output, automated tests, usage notes, decision explanation]
    common_failure_modes: [Invalid arguments pass through, API failure is silent, tool permissions are too broad]
    demonstration_requirements: [Run a success case and a controlled tool or API failure without hidden manual repair]
    documentation_requirements: [Document setup, tool contract, limitations, and recovery behavior]
    retrospective_requirements: [Identify one failed assumption and the next reliability improvement]
    rubric:
      correctness:
        critical: true
        passing_threshold: proficient
        weight: 25
        performance_bands: {insufficient: Critical success or error paths fail, developing: Main path works but validation gaps remain, proficient: All critical success and error tests pass, strong: Adversarial cases also pass with precise contracts}
      capability_behavior:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Cannot complete the tool flow, developing: Completes only with repair guidance, proficient: Independently completes and explains the bounded flow, strong: Adapts the flow to a changed tool contract}
      reliability:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Failures are silent or destructive, developing: Some failures are caught without recovery, proficient: Timeouts validation and recovery are tested, strong: Fault injection demonstrates graceful degradation}
      responsible_practice:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Access is unrestricted or secrets leak, developing: Basic controls exist with material gaps, proficient: Least privilege and secret handling are demonstrated, strong: Threat cases and auditability exceed stated needs}
      business_value:
        critical: false
        passing_threshold: proficient
        weight: 10
        performance_bands: {insufficient: No beneficiary or value measure, developing: Value is asserted but not measured, proficient: Time or error value is measured for the bounded task, strong: Evidence supports adoption and next investment}
      technical_communication:
        critical: false
        passing_threshold: proficient
        weight: 10
        performance_bands: {insufficient: Setup and decisions cannot be reproduced, developing: Notes omit important limits, proficient: Usage decisions and limits are reproducible, strong: A new operator succeeds and explains trade-offs}
  - id: knowledge-application
    level: 2
    name: Knowledge application
    example: A cited question-answer assistant over a controlled knowledge set
    inputs: [Representative source set, user questions, provenance constraints]
    constraints: [Controlled corpus, traceable provenance, explicit abstention, bounded evaluation set]
    deliverables: [Cited assistant, retrieval evaluation, requirements note]
    competency_ids: [llm-fundamentals, prompt-engineering, embedding-retrieval, rag-engineering]
    business_value: Improve access to trusted knowledge and measure answer-grounding quality.
    evidence: [Requirements note, provenance, retrieval tests, groundedness evaluation]
    common_failure_modes: [Unsupported answers, weak retrieval coverage, stale or untraceable sources]
    demonstration_requirements: [Answer representative and adversarial questions while exposing citations and abstentions]
    documentation_requirements: [Document corpus provenance, retrieval design, measures, and known coverage gaps]
    retrospective_requirements: [Analyze one retrieval and one generation failure and prioritize corrective experiments]
    rubric:
      correctness:
        critical: true
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Answers contradict or lack sources, developing: Basic answers work with grounding gaps, proficient: Grounding and citation gates pass, strong: Adversarial questions are answered or safely refused}
      capability_behavior:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Cannot assemble the knowledge flow, developing: Completes only from a supplied implementation, proficient: Independently builds and evaluates the bounded application, strong: Transfers the design to changed corpus requirements}
      reliability:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Retrieval failures are unobserved, developing: Failures are visible but inconsistent, proficient: Retrieval generation and abstention are reproducibly tested, strong: Drift and freshness cases have tested responses}
      responsible_practice:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Provenance or access rules are ignored, developing: Provenance exists but gaps remain, proficient: Sources access and limitations are explicit, strong: Sensitive and conflicting sources are handled defensibly}
      business_value:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: No knowledge-use outcome is named, developing: Outcome is plausible but unmeasured, proficient: Access quality or cycle-time value is measured, strong: Stakeholder evidence supports broader use}
      technical_communication:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Corpus and evaluation cannot be reproduced, developing: Documentation omits key design choices, proficient: Provenance measures and trade-offs are clear, strong: Reviewer can challenge and extend the design}
  - id: workflow
    level: 3
    name: Workflow
    example: A multi-step intake, research, action, and review agent
    inputs: [Workflow brief, interface contracts, exception scenarios]
    constraints: [Explicit termination, bounded autonomy, human approval for consequential action, recoverable state]
    deliverables: [Stateful workflow, trace set, operating guide]
    competency_ids: [tool-calling, agent-workflow, evaluation-observability, technical-communication]
    business_value: Shorten cycle time with explicit human checkpoints and failure recovery.
    evidence: [Interface contract, state diagram, end-to-end tests, operating guide]
    common_failure_modes: [Non-terminating loops, lost state, unsafe automatic action, unrecoverable partial failure]
    demonstration_requirements: [Complete the workflow independently and recover from a forced intermediate failure]
    documentation_requirements: [Document state transitions, interfaces, checkpoints, monitoring, and recovery]
    retrospective_requirements: [Compare expected and observed traces and explain one workflow redesign]
    rubric:
      correctness:
        critical: true
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Critical workflow outcomes are wrong, developing: Happy path works with transition errors, proficient: End-to-end acceptance paths pass, strong: Changed inputs preserve correct state transitions}
      capability_behavior:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Cannot complete the workflow, developing: Requires step-by-step repair, proficient: Independently completes and explains the bounded workflow, strong: Modifies requirements without losing evidence or controls}
      reliability:
        critical: false
        passing_threshold: proficient
        weight: 25
        performance_bands: {insufficient: Loops or partial failures are unrecoverable, developing: Some failures terminate safely, proficient: Termination recovery and traces are tested, strong: Fault injection meets stated recovery targets}
      responsible_practice:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Consequential actions lack approval controls, developing: Checkpoints exist with bypass gaps, proficient: Boundaries approvals and data handling are enforced, strong: Abuse cases and escalation paths are demonstrated}
      business_value:
        critical: false
        passing_threshold: proficient
        weight: 10
        performance_bands: {insufficient: Workflow value is unspecified, developing: Cycle benefit is estimated only, proficient: Cycle time or quality improvement is measured, strong: Adoption evidence supports scaling the workflow}
      technical_communication:
        critical: false
        passing_threshold: proficient
        weight: 10
        performance_bands: {insufficient: State and operations are opaque, developing: Diagram or guide is incomplete, proficient: Interfaces state and recovery are reproducible, strong: Another operator diagnoses a forced failure}
  - id: enterprise-scenario
    level: 4
    name: Enterprise scenario
    example: A governed internal agent connected through MCP to approved systems
    inputs: [Organizational policy, service contracts, risk and service targets]
    constraints: [Least privilege, protected organizational data, auditable actions, tested rollback, service targets]
    deliverables: [Governed integration, threat model, operations package]
    competency_ids: [mcp-integration, deployment-security, evaluation-observability, business-problem-framing]
    business_value: Enable controlled organizational automation with measurable reliability and risk.
    evidence: [Threat model, access controls, service targets, observability, rollback drill]
    common_failure_modes: [Privilege escalation, sensitive-data leakage, missing audit trail, unsafe migration]
    demonstration_requirements: [Demonstrate least privilege, monitoring, exception handling, and a rollback drill]
    documentation_requirements: [Document architecture, threat controls, service objectives, ownership, and runbooks]
    retrospective_requirements: [Analyze one simulated incident and revise a control using trace evidence]
    rubric:
      correctness:
        critical: true
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Critical organizational use cases fail, developing: Main scenario works with integration gaps, proficient: Acceptance scenarios and contracts pass, strong: Cross-system exceptions preserve correct outcomes}
      capability_behavior:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Cannot integrate the governed scenario, developing: Completes with substantial expert repair, proficient: Independently delivers and explains the bounded enterprise scenario, strong: Migrates the design under changed policy or service constraints}
      reliability:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Incidents cannot be detected or recovered, developing: Monitoring exists without tested recovery, proficient: Service targets rollback and incident paths are tested, strong: Fault and migration drills meet documented objectives}
      responsible_practice:
        critical: false
        passing_threshold: proficient
        weight: 25
        performance_bands: {insufficient: Critical threat lacks a control or owner, developing: Controls exist but material gaps remain, proficient: Threats access data and audit controls are verified, strong: Red-team cases improve governance and operating policy}
      business_value:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Organizational value is undefined, developing: Value is estimated without stakeholder evidence, proficient: Reliability risk and outcome measures support the scenario, strong: Stakeholder evidence supports governed expansion}
      technical_communication:
        critical: false
        passing_threshold: proficient
        weight: 10
        performance_bands: {insufficient: Architecture and ownership are unclear, developing: Handover omits critical operations, proficient: Architecture controls and runbooks support review, strong: Operators execute incident and migration procedures unaided}
  - id: portfolio-case
    level: 5
    name: Portfolio case
    example: A defensible AI agent case study with comparative architecture decisions
    inputs: [Verified project evidence, audience needs, alternative designs]
    constraints: [Public-safe evidence, no unsupported claims, reproducible demonstration, audience-bounded disclosure]
    deliverables: [Case narrative, public-safe demo, architecture and evaluation package]
    competency_ids: [business-problem-framing, agent-workflow, evaluation-observability, technical-communication]
    business_value: Make engineering judgment and outcome evidence legible to evaluators.
    evidence: [Narrative, alternatives, measures, architecture, demonstration, reflection]
    common_failure_modes: [Unverified claims, decorative metrics, missing alternatives, confidential-data exposure]
    demonstration_requirements: [Present the system live and answer evidence-based architecture and failure questions]
    documentation_requirements: [Document problem, alternatives, measures, architecture, limits, and safe reproduction]
    retrospective_requirements: [Explain how evidence changed the design and what would be done differently next]
    rubric:
      correctness:
        critical: true
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Material claims conflict with artifacts, developing: Main claims are accurate with evidence gaps, proficient: All material claims match reproducible evidence, strong: Independent review confirms claims across edge cases}
      capability_behavior:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Cannot demonstrate claimed capabilities, developing: Demonstrates with prompting or repair, proficient: Independently demonstrates and defends bounded capabilities, strong: Adapts the case to changed evaluator requirements}
      reliability:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Demo is fragile or unrecoverable, developing: Main demo works without failure evidence, proficient: Demo evaluation and recovery are repeatable, strong: Live failure diagnosis is precise and evidence-backed}
      responsible_practice:
        critical: false
        passing_threshold: proficient
        weight: 10
        performance_bands: {insufficient: Confidential or misleading content is exposed, developing: Safety review leaves material gaps, proficient: Disclosure privacy and limitations are handled, strong: Public-safe transformation preserves auditability and nuance}
      business_value:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: No verified beneficiary or outcome, developing: Value claim is weakly measured, proficient: Before-after evidence supports meaningful value, strong: Alternatives and adoption evidence strengthen the investment case}
      technical_communication:
        critical: false
        passing_threshold: proficient
        weight: 25
        performance_bands: {insufficient: Narrative obscures decisions and limits, developing: Case is understandable but incomplete, proficient: Architecture trade-offs evidence and limits are clear, strong: Review questions produce concise teachable and defensible answers}
  - id: real-external-delivery
    level: 6
    name: Real external delivery
    example: An accepted agent workflow for an external stakeholder's bounded need
    inputs: [Dated stakeholder brief, agreed scope, real operating constraints]
    constraints: [Agreed scope and acceptance criteria, stakeholder privacy, operational handover, bounded support commitment]
    deliverables: [Accepted system, handover package, feedback and change record]
    competency_ids: [multi-agent-coordination, deployment-security, business-problem-framing, technical-communication]
    business_value: Produce verified stakeholder value and adoption evidence in a real context.
    evidence: [Dated brief, scope agreement, change log, acceptance evidence, handover, feedback]
    common_failure_modes: [Scope drift, hidden manual work, weak acceptance evidence, incomplete handover]
    demonstration_requirements: [Deploy or deliver in the agreed context and demonstrate acceptance and recovery behavior]
    documentation_requirements: [Document scope, changes, operations, ownership, privacy, and handover acceptance]
    retrospective_requirements: [Compare promised and realized value and incorporate stakeholder feedback into next actions]
    rubric:
      correctness:
        critical: true
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Delivery fails critical acceptance criteria, developing: Partial criteria pass with unresolved defects, proficient: All critical criteria pass or have approved exceptions, strong: Real use confirms correctness beyond the acceptance set}
      capability_behavior:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Delivery depends on hidden expert intervention, developing: Completes with repeated stakeholder or mentor repair, proficient: Independently delivers the bounded agreed outcome, strong: Adapts delivery to a justified scope change}
      reliability:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Operational failure lacks recovery or owner, developing: Basic operations exist without tested continuity, proficient: Monitoring recovery and handover rehearsal pass, strong: Real or simulated incidents improve service resilience}
      responsible_practice:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Scope privacy or consent is violated, developing: Controls exist with unresolved exposure, proficient: Scope data consent and limitations are respected, strong: Stakeholder review confirms responsible operation and escalation}
      business_value:
        critical: false
        passing_threshold: proficient
        weight: 20
        performance_bands: {insufficient: Stakeholder reports no usable value, developing: Value is anecdotal or below target, proficient: Acceptance and measures verify agreed value, strong: Sustained use or expansion evidence exceeds the target}
      technical_communication:
        critical: false
        passing_threshold: proficient
        weight: 15
        performance_bands: {insufficient: Stakeholder cannot operate or evaluate delivery, developing: Handover needs undocumented intervention, proficient: Stakeholder can operate and explain limits, strong: Stakeholder teaches operation or reviews future changes confidently}

assessment_patterns:
  - id: behavior-demonstration
    evaluator: qualified reviewer
    artifact: runnable system and trace
    observed_behavior: Executes the target-level behavior under stated constraints.
    threshold: All critical checks pass and no critical behavior is unobserved.
    feedback_loop: Convert failed criteria into the smallest causal practice and reassess with new evidence.
    capability_checks: [independent-completion, debug]
    result_levels:
      understanding: Explains concepts and predicts behavior but does not yet complete the task.
      guided: Completes with an example, template, prompts, or evaluator guidance.
      independent: Independently completes the bounded real task under stated constraints.
      transfer: Modifies requirements and resolves a novel failure without step-by-step guidance.
  - id: comparative-evaluation
    evaluator: technical reviewer
    artifact: versioned test set and comparison report
    observed_behavior: Selects an approach using quality, reliability, latency, cost, and risk evidence.
    threshold: Recommendation is reproducible and supported by predefined measures.
    feedback_loop: Expand representative cases or revise the decision when measures contradict the claim.
    capability_checks: [explain-trade-offs, modify-requirements]
    result_levels:
      understanding: Explains evaluation concepts and candidate trade-offs without executing the comparison.
      guided: Completes the comparison with a supplied test set, template, or evaluator guidance.
      independent: Independently completes a bounded real comparison and defends the selected trade-offs.
      transfer: Revises requirements, measures, or architecture when new evidence changes the decision.
  - id: stakeholder-acceptance
    evaluator: external or role-representative stakeholder
    artifact: acceptance record and feedback
    observed_behavior: Delivers agreed business value and communicates limitations and operations.
    threshold: Named acceptance criteria are met or exceptions are explicitly accepted.
    feedback_loop: Reframe unmet needs, update scope, and preserve superseded evidence.
    capability_checks: [deploy-deliver, teach-review]
    result_levels:
      understanding: Explains delivery, review, and handover expectations without completing delivery.
      guided: Delivers a representative artifact with a checklist, template, or stakeholder guidance.
      independent: Independently deploys or delivers the bounded real outcome and completes handover.
      transfer: Teaches or reviews the work and adapts delivery to changed stakeholder requirements.

outcome_preparation:
  employment_preparation:
    source: Learning Architect reference synthesis
    as_of: "2026-07-13"
    minimum_evidence:
      - One portfolio case with a complete competency coverage matrix
      - One real or role-representative delivery with independent feedback
      - A live system walkthrough including one diagnosed failure
      - A concise architecture, evaluation, security, and business-value narrative
    artifacts:
      - Role-targeted resume evidence bullets
      - Public-safe repository or demonstration package
      - Case-study narrative with measures and limitations
      - Interview stories covering decisions, conflict, failure, and iteration
    readiness_gate: An evaluator can verify target behaviors from artifacts rather than course-completion claims.

market_assumptions:
  - id: agentic-ai-demand
    as_of: "2026-07-13"
    source_name: World Economic Forum, Future of Jobs Report 2025
    assumption: AI-related skill demand will continue to reward candidates who combine technical implementation with analytical and collaborative capabilities.
    confidence: medium
    implication: Preserve business framing and communication beside model and agent engineering.
    next_review_at: "2026-10-11"
  - id: responsible-production-evidence
    as_of: "2026-07-13"
    source_name: NIST AI 600-1, Generative Artificial Intelligence Profile
    assumption: Production AI work will continue to require documented measurement, risk treatment, monitoring, and human oversight.
    confidence: high
    implication: Require evaluation, security, observability, and rollback evidence in advanced projects.
    next_review_at: "2026-10-11"
  - id: interoperability-value
    as_of: "2026-07-13"
    source_name: Model Context Protocol Specification 2025-06-18
    assumption: Open capability-discovery and tool-integration patterns will remain relevant to agent interoperability, while implementations will continue to change.
    confidence: medium
    implication: Teach protocol concepts, trust boundaries, and replaceable integrations rather than one vendor stack.
    next_review_at: "2026-10-11"

