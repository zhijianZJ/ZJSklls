$schema: https://json-schema.org/draft/2020-12/schema
title: Learning Evidence
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, type, artifact, competency_ids, evaluator, score, observed_behaviors, verified_at]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/schema_version}
  content_version: {$ref: common.schema.yaml#/$defs/content_version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  type: {type: string, enum: [project, assessment, interview, workplace, explanation]}
  artifact: {type: string, minLength: 1}
  competency_ids: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
  evaluator: {type: string, enum: [self, ai, mentor, employer, reviewer]}
  score: {type: number, minimum: 0, maximum: 1}
  observed_behaviors:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [behavior, state, observation]
      properties:
        behavior:
          type: string
          enum: [independent, explain, modify, debug, deploy, teach]
        state: {type: string, enum: [pass, fail]}
        observation: {type: string, minLength: 1}
  verified_at: {$ref: common.schema.yaml#/$defs/timestamp}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
